# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"


BBFILE_COLLECTIONS += "meta-sheli"

BBFILE_PATTERN_meta-sheli = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-sheli = "6"

LAYERDEPENDS_meta-sheli = "core"
LAYERSERIES_COMPAT_meta-sheli = "gatesgarth"
